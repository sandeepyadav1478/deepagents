# Nightly full-sweep CodSpeed benchmarks
#
# Manual `workflow_dispatch` is provided for ad-hoc full sweeps.

name: "Benchmark (nightly)"

on:
  schedule:
    # 09:00 UTC daily (off-peak for US contributors).
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark-deepagents:
    name: "⏱️ Benchmark deepagents"
    if: github.repository_owner == 'langchain-ai'
    permissions:
      contents: read
      # Required for CodSpeed OIDC authentication in _benchmark.yml
      id-token: write
    uses: ./.github/workflows/_benchmark.yml
    with:
      working-directory: "libs/deepagents"
    secrets: inherit

  benchmark-code:
    name: "⏱️ Benchmark code"
    if: github.repository_owner == 'langchain-ai'
    permissions:
      contents: read
      # Required for CodSpeed OIDC authentication in _benchmark.yml
      id-token: write
    uses: ./.github/workflows/_benchmark.yml
    with:
      working-directory: "libs/code"
    secrets: inherit
